name: Publish NPM Package

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  check-version:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.version-check.outputs.should_publish }}
      local_version: ${{ steps.version-check.outputs.local_version }}
      published_version: ${{ steps.version-check.outputs.published_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: npm
      - run: npm ci
      - id: version-check
        shell: bash
        run: |
          LOCAL_VERSION=$(node -p "require('./packages/core/package.json').version")
          PUBLISHED_VERSION=$(npm view @wegame-adapter-kit/core version 2>/dev/null || true)

          echo "local_version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "published_version=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$LOCAL_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "@wegame-adapter-kit/core@$LOCAL_VERSION already exists on npm, skip publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Will publish @wegame-adapter-kit/core@$LOCAL_VERSION"
          fi

  publish-npm:
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm publish --workspace @wegame-adapter-kit/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
